<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sfondo dark slate -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  
  <!-- Bordo tratteggiato interno -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#334155" stroke-width="4" stroke-dasharray="16 16" rx="16"/>
  
  <!-- Icona (clessidra stilizzata o simile) -->
  <g transform="translate(400, 240) scale(1.5)" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-20,-20 L20,-20 L0,0 L20,20 L-20,20 L0,0 Z"/>
    <path d="M-10,-20 L-10,-24 M10,-20 L10,-24 M-10,20 L-10,24 M10,20 L10,24"/>
  </g>
  
  <!-- Testo principale -->
  <text x="50%" y="55%" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" fill="#c7d2fe" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">
    COMING SOON
  </text>
  
  <!-- Sottotitolo -->
  <text x="50%" y="62%" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#64748b" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">
    Progetto in fase di sviluppo
  </text>
</svg>
